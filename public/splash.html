<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Inventory Management</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(247,200,72,0.18), transparent 36%),
          radial-gradient(circle at 80% 10%, rgba(115,168,255,0.22), transparent 28%),
          linear-gradient(140deg, #0a0a0f 0%, #0b0b12 45%, #06060b 100%);
        color: #f7c848;
        font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
        overflow: hidden;
      }
      .glow {
        position: absolute;
        width: 220px;
        height: 220px;
        filter: blur(80px);
        opacity: 0.35;
        background: linear-gradient(135deg, #f7c848, #ffefb0);
        animation: float 6s ease-in-out infinite;
      }
      .glow.alt {
        right: -60px; bottom: -60px;
        background: linear-gradient(135deg, #6fb1ff, #b8d4ff);
        animation-delay: -1.5s;
      }
      @keyframes float {
        0%, 100% { transform: translateY(-10px); opacity: 0.35; }
        50% { transform: translateY(10px); opacity: 0.5; }
      }
      .card {
        position: relative;
        width: 82%;
        max-width: 460px;
        padding: 26px 28px 24px;
        background: rgba(16, 16, 24, 0.9);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        box-shadow: 0 30px 80px rgba(0,0,0,0.55), 0 0 30px rgba(247,200,72,0.25);
        text-align: center;
        backdrop-filter: blur(12px);
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 11px;
        letter-spacing: 0.18em;
        color: #0b0b10;
        background: linear-gradient(120deg, #ffd977, #f7c848 55%, #e7ac2f);
        text-transform: uppercase;
        font-weight: 700;
        box-shadow: 0 10px 25px rgba(247,200,72,0.35);
      }
      h1 {
        margin: 16px 0 6px 0;
        font-size: 26px;
        letter-spacing: 0.06em;
        color: #fef9e7;
      }
      .sub { margin: 0; color: #cfd2dd; letter-spacing: 0.22em; font-size: 11px; text-transform: uppercase; }
      .progress {
        margin: 18px auto 6px;
        width: 80%;
        height: 6px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
      }
      .progress::after {
        content: "";
        display: block;
        height: 100%;
        width: 45%;
        background: linear-gradient(90deg, rgba(247,200,72,0.1), #f7c848, rgba(247,200,72,0.1));
        animation: load 2.2s ease-in-out infinite;
      }
      @keyframes load {
        0% { transform: translateX(-60%); }
        50% { transform: translateX(40%); }
        100% { transform: translateX(120%); }
      }
      .foot {
        margin: 0;
        color: #8a8ea4;
        font-size: 11px;
        letter-spacing: 0.08em;
      }
      .status { margin-top: 10px; color: #e4e6f0; font-size: 13px; letter-spacing: 0.02em; }
      .hint { margin: 2px 0 0; color: #9aa0b5; font-size: 12px; }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="glow alt"></div>
    <div class="card">
      <div class="badge">VNE DIGITAL</div>
      <h1>INVENTORY MANAGEMENT</h1>
      <p class="sub">Launching workspace</p>
      <div class="progress"></div>
      <div id="status" class="status">Activation needed: please select your license file</div>
      <div class="hint">If you see a picker, choose the .lic file from your vendor.</div>
      <p class="foot">Please wait…</p>
    </div>
    <script>
      window.setStatus = (msg) => {
        const el = document.getElementById("status");
        if (el) el.textContent = msg;
      };
    </script>
  </body>
</html>
